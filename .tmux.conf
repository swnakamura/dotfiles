####################################################################
# General
####################################################################
# 既存のキーバインドを全て解除
unbind C-b
unbind-key -a

# prefix を C-s に変更
set-option -g prefix C-s
bind C-s send-prefix

set -sg escape-time 1          # キー入力の遅延を減らす
set -s set-clipboard on        # クリップボード連携
set -g renumber-windows on     # ウィンドウを閉じたら番号を詰め直す
set -g base-index 1
set-option -g mouse on         # マウス操作を有効化

# .tmux.conf をリロード
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

####################################################################
# Copy mode (vi)
####################################################################
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "/usr/bin/tee -a $HOME/tmux_copy.txt"

bind-key [   copy-mode         # prefix + [
bind-key -n M-[ copy-mode      # Alt + [

####################################################################
# Pane
####################################################################
# 分割（カレントパスを引き継ぐ）
bind v   split-window -h -c "#{pane_current_path}"
bind C-v split-window -h -c "#{pane_current_path}"
bind s   split-window -v -c "#{pane_current_path}"

# vim 風のペイン移動（prefix + h/j/k/l, Alt + h/j/k/l）
bind h   select-pane -L
bind C-h select-pane -L
bind j   select-pane -D
bind C-j select-pane -D
bind k   select-pane -U
bind C-k select-pane -U
bind l   select-pane -R
bind C-l select-pane -R
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-p select-pane -t :.-
bind -n M-n select-pane -t :.+

# レイアウト切替（tmux デフォルト相当, prefix + M-1..M-5）
bind M-1 select-layout even-horizontal   # 左右均等
bind M-2 select-layout even-vertical     # 上下均等
bind M-3 select-layout main-horizontal
bind M-4 select-layout main-vertical
bind M-5 select-layout tiled

# even-horizontal ⇄ even-vertical をトグル（prefix + Space）
# even-vertical はペイン幅=ウィンドウ幅になるので、それで現在の向きを判定して反対へ
bind Space if-shell -F '#{==:#{window_width},#{pane_width}}' \
  'select-layout even-horizontal' \
  'select-layout even-vertical'

# ペインを方向指定で移動（prefix + H/J/K/L で隣のペインと位置を入れ替え）
bind -r H swap-pane -s '{left-of}'
bind -r J swap-pane -s '{down-of}'
bind -r K swap-pane -s '{up-of}'
bind -r L swap-pane -s '{right-of}'

# ズーム（prefix + z/C-z/Enter/C-Enter, Alt + z/Enter）
bind z       resize-pane -Z
bind C-z     resize-pane -Z
bind Enter   resize-pane -Z
bind C-Enter resize-pane -Z
bind -n M-z     resize-pane -Z
bind -n M-Enter resize-pane -Z

# ペイン同期のトグル
bind C-y setw synchronize-panes\; display-message "synchronize-panes is now #{?pane_synchronized,on,off}"

# 確認してからペインを終了
bind-key x confirm-before -p "kill-pane #P? (y/n)" kill-pane

####################################################################
# Window
####################################################################
# 新規ウィンドウ
bind t   new-window -c "#{pane_current_path}"
bind C-t new-window -c "#{pane_current_path}"
bind c   new-window
bind C-c new-window
bind -n M-c new-window

# 移動
bind n   next-window
bind p   previous-window
bind C-n next-window
bind C-p previous-window
bind o   last-window
bind M-o last-window

# Prefix + < / > でウィンドウを左右に入れ替え
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

# 番号でウィンドウへ移動（Alt + 1..9 / prefix + 0..9）
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind-key 0 select-window -t 0
bind-key 1 select-window -t 1
bind-key 2 select-window -t 2
bind-key 3 select-window -t 3
bind-key 4 select-window -t 4
bind-key 5 select-window -t 5
bind-key 6 select-window -t 6
bind-key 7 select-window -t 7
bind-key 8 select-window -t 8
bind-key 9 select-window -t 9

# ウィンドウ名の変更（prefix + , / Alt + ,）
bind-key ,      command-prompt -I "#W" "rename-window '%%'"
bind-key -n M-, command-prompt -I "#W" "rename-window '%%'"

# ツリー表示 / ペインをウィンドウに切り出し
bind-key w choose-tree -w
bind-key ! break-pane

####################################################################
# Session
####################################################################
bind -n M-C new-session
bind -n M-pagedown switch-client -n
bind -n M-pageup   switch-client -p

# セッション名の変更（prefix + $ / Alt + $）
bind-key '$'    command-prompt -I "#S" "rename-session '%%'"
bind-key -n M-$ command-prompt -I "#S" "rename-session '%%'"

# デタッチ
bind d   detach
bind C-d detach

####################################################################
# Terminal / Truecolor
####################################################################
# Ghostty(local) と SSH(remote) 両対応
set-option -g default-terminal "tmux-256color"

# Truecolor (24-bit)
set-option -sa terminal-features ',xterm*:RGB'
set-option -sa terminal-features ',screen*:RGB'
set-option -sa terminal-overrides ',xterm*:Tc'
set-option -sa terminal-overrides ',screen*:Tc'

# 拡張アンダーライン
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Extended keys (CSI u / kitty keyboard protocol) — neovim での Ctrl+; Ctrl+` Ctrl+/ 等に必要
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -as terminal-features 'screen*:extkeys'
set -as terminal-features 'kitty*:extkeys'
set -as terminal-features 'ghostty*:extkeys'

# yazi の画像プレビュー用 https://yazi-rs.github.io/docs/image-preview#tmux
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
set -g allow-passthrough on

####################################################################
# Status bar
####################################################################
set -g status-interval 5
set -g status-position top
set -g status-justify left
set -g status-fg colour249
set -g status-bg colour235

## Left: Session (highlighted) · Host (italic)
host_bg="#313244"
set -g status-left "#[fg=${host_bg},bg=colour234]#[fg=colour250,bg=${host_bg},bold]#S#[fg=${host_bg},bg=colour235]#[fg=colour246,bg=colour235,italics] #H #[fg=colour235,bg=colour235,noitalics]"
set -g status-left-length 70
set -g status-left-style default

## Right: カレントディレクトリ名 + 時刻
color_dark="#313244"
color_fg="#cdd6f4"
color_pink="#f5c2e7"
color_blue="#89b4fa"
set -g status-right ""
set -g status-right-length 0
set -ga status-right "#[fg=${color_pink},bg=default]"
set -ga status-right "#[fg=#1e1e2e,bg=${color_pink}] "
set -ga status-right "#[fg=${color_fg},bg=${color_dark}] #(basename #{pane_current_path}) "
set -ga status-right "#[fg=${color_dark},bg=default] "
set -ga status-right "#[fg=${color_blue},bg=default]"
set -ga status-right "#[fg=#1e1e2e,bg=${color_blue}]󱑂 "
set -ga status-right "#[fg=${color_fg},bg=${color_dark}] %H:%M "
set -ga status-right "#[fg=${color_dark},bg=default]"

## window status（外部スクリプトで描画）
setw -g window-status-format "#( ~/.tmux_status_format.sh '#{pane_current_command}' '#I' '#W' '#{window_panes}' '#{window_bell_flag}' '#{window_activity_flag}' '#{window_last_flag}' '#{window_zoomed_flag}' 0 )"
setw -g window-status-current-format "#( ~/.tmux_status_format.sh '#{pane_current_command}' '#I' '#W' '#{window_panes}' '#{window_bell_flag}' '#{window_activity_flag}' '#{window_last_flag}' '#{window_zoomed_flag}' 1 )"
setw -g window-status-current-style "fg=colour255,bg=colour24,bold"
setw -g window-status-style "fg=colour244,bg=colour235"
setw -g window-status-activity-style "fg=colour214,bg=colour235,bold"
setw -g window-status-bell-style "fg=colour255,bg=colour196,bold"

####################################################################
# Activity monitoring
####################################################################
setw -g monitor-activity on
set -g visual-activity off

####################################################################
# Plugins (tpm)
####################################################################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # <C-s><C-s> save, <C-s><C-r> restore
set -g @plugin 'Morantron/tmux-fingers'        # <C-s>F でコピー, <C-s>f で jump
set -g @fingers-jump-key 'f'                    # jump キーを J から f へ（J はペイン移動で使う）

set -g @sessionx-bind '0'
set -g @sessionx-fzf-builtin-tmux 'on'  # fzf >= 0.53 のネイティブ --tmux を使う（旧 fzf-tmux の -p を避ける）
set -g @plugin 'omerxx/tmux-sessionx'

run '~/ghq/github.com/tmux-plugins/tpm/tpm'
